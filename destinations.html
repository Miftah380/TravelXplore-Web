<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Destinations | TravelXplore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="flex flex-col min-h-screen">

    <nav id="main-nav" class="bg-transparent py-6 fixed w-full z-50 transition-all duration-300">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <h1 id="nav-logo" class="text-2xl font-black tracking-tighter text-white transition-colors animate-fade-up">
                TravelXplore.
            </h1>
            <ul class="hidden md:flex space-x-8 text-sm font-bold uppercase tracking-wider animate-fade-up">
                <li><a href="index.html" class="nav-link text-white hover:text-blue-300 transition-colors">Home</a></li>
                <li><a href="destinations.html" class="nav-link text-white border-b-2 border-blue-400 pb-1">Destinations</a></li>
                <li><a href="about.html" class="nav-link text-white hover:text-blue-300 transition-colors">Company</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Search Section -->
    <header class="relative pt-32 pb-40 flex items-center justify-center min-h-[65vh] bg-[url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center">
        <div class="absolute inset-0 bg-gradient-to-b from-gray-900/80 to-blue-900/40"></div>
        
        <div class="relative z-10 container mx-auto px-6 text-center max-w-4xl">
            <div class="animate-fade-up">
                <h2 class="text-5xl md:text-7xl font-extrabold text-white mb-6 drop-shadow-xl">Where to next?</h2>
                <p class="text-lg md:text-xl text-gray-200 mb-12 font-light drop-shadow-md">Search thousands of destinations globally.</p>
            </div>
            
            <div class="bg-white p-2 rounded-full shadow-2xl flex items-center focus-within:ring-4 focus-within:ring-blue-400/50 transition-all animate-float mx-auto max-w-3xl">
                <div class="pl-6 pr-4 text-gray-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <input type="text" id="searchInput" placeholder="Search a country (e.g., Indonesia, Japan)..." 
                    class="w-full py-4 text-gray-800 text-lg focus:outline-none bg-transparent font-medium">
                <button id="searchBtn" class="bg-blue-600 text-white font-bold px-10 py-4 rounded-full hover:bg-blue-700 hover:scale-105 transition-all transform text-lg shadow-lg">
                    Search
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-6 py-16 -mt-20 relative z-20">
        <div id="loading" class="text-center bg-white p-8 rounded-2xl shadow-xl hidden max-w-sm mx-auto border border-gray-100 animate-float">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-100 border-t-blue-600 mb-4"></div>
            <p class="text-gray-700 font-bold text-lg">Retrieving Database...</p>
        </div>
        
        <div id="error-msg" class="text-center bg-red-50 border border-red-200 rounded-2xl p-8 hidden max-w-2xl mx-auto shadow-lg animate-fade-up">
            <div class="text-red-500 text-5xl mb-4">🌍</div>
            <h3 class="text-2xl font-bold text-gray-900 mb-2">Destination Not Found</h3>
            <p class="text-gray-600 text-lg">Please check your spelling.</p>
        </div>

        <div id="country-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </main>

    <footer class="bg-white text-gray-500 py-10 border-t border-gray-200 mt-auto">
        <div class="container mx-auto px-6 text-center font-medium">
            <h2 class="text-2xl font-black text-blue-700 mb-2">TravelXplore.</h2>
            <p>&copy; <span class="current-year"></span> TravelXplore Global Inc. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const nav = document.getElementById('main-nav');
            const logo = document.getElementById('nav-logo');
            const links = document.querySelectorAll('.nav-link');

            window.addEventListener('scroll', () => {
                if (window.scrollY > 50) {
                    nav.classList.add('bg-white/90', 'backdrop-blur-md', 'shadow-md', 'py-4');
                    nav.classList.remove('bg-transparent', 'py-6');
                    logo.classList.add('text-blue-700'); logo.classList.remove('text-white');
                    links.forEach(link => { link.classList.add('text-gray-800'); link.classList.remove('text-white'); });
                } else {
                    nav.classList.add('bg-transparent', 'py-6');
                    nav.classList.remove('bg-white/90', 'backdrop-blur-md', 'shadow-md', 'py-4');
                    logo.classList.add('text-white'); logo.classList.remove('text-blue-700');
                    links.forEach(link => { link.classList.add('text-white'); link.classList.remove('text-gray-800'); });
                }
            });

            const container = document.getElementById('country-container');
            const loading = document.getElementById('loading');
            const errorMsg = document.getElementById('error-msg');
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');

            async function fetchDestinations(url) {
                try {
                    container.innerHTML = ''; 
                    errorMsg.classList.add('hidden');
                    loading.classList.remove('hidden');

                    const response = await fetch(url);
                    if (!response.ok) throw new Error('Not found');
                    
                    const data = await response.json();
                    loading.classList.add('hidden');
                    
                    renderCards(data.slice(0, 16)); 
                } catch (error) {
                    loading.classList.add('hidden');
                    errorMsg.classList.remove('hidden');
                }
            }

            function renderCards(countries) {
                countries.forEach((country, index) => {
                    const flagUrl = country.flags.svg;
                    const name = country.name.common;
                    const capital = country.capital ? country.capital[0] : '-';
                    const region = country.region;
                    const animDelay = (index % 4) * 0.1;
                    
                    // FORMAT LINK BARU: Pencarian langsung ke Google Maps!
                    const customMapsLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name)}`;

                    const cardHTML = `
                        <div class="bg-white rounded-2xl overflow-hidden destination-card border border-gray-100 flex flex-col h-full animate-fade-up" style="animation-delay: ${animDelay}s; opacity: 0;">
                            <div class="relative h-48 overflow-hidden group">
                                <img src="${flagUrl}" alt="${name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                                <div class="absolute top-4 right-4 bg-white/90 backdrop-blur-sm text-blue-700 text-xs font-bold px-3 py-1 rounded-full shadow-sm">
                                    ${region}
                                </div>
                            </div>
                            <div class="p-6 flex-grow flex flex-col justify-between">
                                <div>
                                    <h4 class="text-xl font-extrabold text-gray-900 mb-2 truncate">${name}</h4>
                                    <p class="text-sm text-gray-500 mb-4 flex items-center gap-2">
                                        <span class="text-blue-500 text-lg">📍</span> Capital: ${capital}
                                    </p>
                                </div>
                                <a href="${customMapsLink}" target="_blank" rel="noopener noreferrer" class="w-full bg-blue-50 text-blue-700 font-bold py-3 rounded-xl hover:bg-blue-600 hover:text-white transition-colors duration-300 flex justify-center items-center gap-2 text-center block">
                                    Explore ${name} 🗺️
                                </a>
                            </div>
                        </div>
                    `;
                    container.innerHTML += cardHTML;
                });
            }

            searchBtn.addEventListener('click', () => {
                const query = searchInput.value.trim();
                fetchDestinations(query === '' ? 'https://restcountries.com/v3.1/all' : `https://restcountries.com/v3.1/name/${query}`);
            });

            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchBtn.click();
            });

            fetchDestinations('https://restcountries.com/v3.1/all');

            document.querySelectorAll('.current-year').forEach(el => el.textContent = new Date().getFullYear());
        });
    </script>
</body>
</html>
